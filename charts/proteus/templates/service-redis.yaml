---
apiVersion: v1
kind: Service
metadata:
  name: {{ template "proteus.fullname" . }}-redis
  labels:
    {{- include "proteus.labels" . | nindent 4 }}
spec:
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ template "proteus.fullname" . }}
    app.kubernetes.io/component: redis

