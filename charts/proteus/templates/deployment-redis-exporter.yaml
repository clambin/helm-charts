---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "proteus.fullname" . }}-redis-exporter
  labels:
    {{- include "proteus.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ template "proteus.fullname" . }}
      app.kubernetes.io/component: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ template "proteus.fullname" . }}
        app.kubernetes.io/component: redis-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      containers:
        - name: proteus-redis-exporter
          image: {{ .Values.redis_exporter.image.repository }}:{{ .Values.redis_exporter.image.tag }}
          imagePullPolicy: {{ .Values.redis_exporter.image.pullPolicy }}
          args:
            - -redis.addr={{ template "proteus.fullname" . }}-redis
            - -redis.password=$(REDIS_PASSWORD)
          envFrom:
            - secretRef:
                name: {{ .Values.redis.credentials }}
          ports:
            - name: metrics
              containerPort: 9121
            - name: tcp-redis
              containerPort: 6379