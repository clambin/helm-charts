# Default values for proteus.
# This is a YAML-formatted file.

fullnameOverride: "proteus-test"

image:
  repository: codeberg.org/clambin/proteus
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

redis:
  credentials: proteus
env:
  - name: ENVVAR
    value: foobar
log:
  format: json
  level: info
prom:
  addr: :9100
  path: /metrics
health:
  addr: :8080
  path: /healthz
homewizard:
  interval: 30s
  podLabels:
    foo: "bar"
  addr: http://192.168.0.188/
  args:
    - --log.level=debug
battery:
  podAnnotations:
    bar: "foo"
  batteries:
    - name: large
      capacity: 10000
      rate: 5000
  args:
    - --log.level=debug
solaredge:
  credentials: proteus
  collector:
    interval: 5m
    args:
      - --log.level=debug
    nodeSelector:
      kubernetes.io/arch: amd64
  store:
    enabled: true
    args:
      - --log.level=debug
    resources: {}
    tolerations:
      - key: "key1"
        operator: "Equal"
        value: "value1"
        effect: "NoSchedule"
  web:
    replicas: 2
    args:
      - --log.level=debug
    resources: {}
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: topology.kubernetes.io/zone
                  operator: In
                  values:
                    - antarctica-east1
                    - antarctica-west1
    httpRoute:
      enabled: true
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: web
      hostnames:
        - solaredge.192.168.0.25.nip.io
tado:
  collector:
    interval: 10m
    args:
      - --log.level=debug
    podAnnotations:
      foobar: "snafu"
  controller:
    enabled: true
    args:
      - --log.level=debug
    rules:
      enabled: true
      volume:
        configMap:
          name: tado-rules
    podLabels:
      foobar: "snafu"
watchdog:
  enabled: true
  alertmanager: http://localhost:9093
  interval: 1m
  channels: "tado:15m,solaredge:10m,homewizard:1m"
  args:
    - --log.level=debug
  startupProbe: {}
  livenessProbe: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}